<!DOCTYPE html>
<html>
<head>

<link rel="apple-touch-icon" href="icon.JPG">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pro Futures Risk Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#0e0e0e; color:white;}
input, select, button { width:100%; padding:10px; margin:6px 0; font-size:16px;}
button { background:#00c853; color:white; border:none; cursor:pointer;}
button:hover { opacity:0.9; }
.result { margin-top:20px; font-size:16px; line-height:1.6;}
.green { color:#00e676; }
.red { color:#ff5252; }
.price-box { background:#1a1a1a; padding:10px; margin-bottom:15px; border-radius:8px; }
.chart-box { margin-top:30px; }
.row { display:flex; gap:10px; }
.row button { width:50%; }
.small-btn { background:#2962ff; font-size:14px; }
</style>

</head>
<body>

<h2>Pro Futures Risk Calculator</h2>

<div id="bigWinrate" style="
font-size:40px;
font-weight:bold;
text-align:center;
margin:15px 0;
color:#00e676;">
Winrate: 0%
</div>

<div class="price-box">
<b>Live Market</b><br>
BTC: <span id="btc">Loading...</span> USDT<br>
ETH: <span id="eth">Loading...</span> USDT<br>
SOL: <span id="sol">Loading...</span> USDT
</div>

<label>Select Coin</label>
<select id="coinSelect">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
</select>

<button class="small-btn" onclick="autoFill()">Auto Fill Entry = Market Price</button>

<label>Direction</label>
<select id="direction">
<option value="long">LONG</option>
<option value="short">SHORT</option>
</select>

<label>Entry Price</label>
<input type="number" id="entry">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Account Size (USDT)</label>
<input type="number" id="account">

<label>Risk % per Trade</label>
<input type="number" id="riskPercent">

<label>Leverage</label>
<input type="number" id="leverage">

<div class="row">
<button onclick="calculate()">CALCULATE</button>
<button onclick="saveTrade()">SAVE</button>
</div>

<label>Trade Result</label>
<select id="resultSelect">
<option value="win">WIN</option>
<option value="loss">LOSS</option>
</select>

<div class="result" id="output"></div>

<div class="chart-box">
<h3>Winrate (%)</h3>
<canvas id="winChart"></canvas>
</div>

<div class="chart-box">
<h3>Equity Curve</h3>
<canvas id="profitChart"></canvas>
</div>

<script>

// ================= LIVE PRICE =================
let priceCache = {};

async function fetchPrice(symbol, elementId) {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
    const data = await res.json();
    let price = parseFloat(data.price);
    priceCache[symbol] = price;
    document.getElementById(elementId).innerText = price.toFixed(2);
}

function updatePrices() {
    fetchPrice("BTCUSDT","btc");
    fetchPrice("ETHUSDT","eth");
    fetchPrice("SOLUSDT","sol");
}

updatePrices();
setInterval(updatePrices, 5000);

function autoFill(){
    let coin = document.getElementById("coinSelect").value;
    if(priceCache[coin]){
        document.getElementById("entry").value = priceCache[coin];
    }
}

// ================= CALCULATOR =================
let lastTrade = null;

function calculate() {

let coin = document.getElementById("coinSelect").value.replace("USDT","");
let dir = document.getElementById("direction").value;
let entry = parseFloat(document.getElementById("entry").value);
let tp = parseFloat(document.getElementById("tp").value);
let sl = parseFloat(document.getElementById("sl").value);
let account = parseFloat(document.getElementById("account").value);
let riskPercent = parseFloat(document.getElementById("riskPercent").value);
let leverage = parseFloat(document.getElementById("leverage").value);

if ([entry,tp,sl,account,riskPercent,leverage].some(isNaN)) {
document.getElementById("output").innerHTML = "Enter all values.";
return;
}

let riskCapital = account * riskPercent / 100;

let priceRisk = dir === "long" ? entry - sl : sl - entry;
let priceReward = dir === "long" ? tp - entry : entry - tp;

if (priceRisk <= 0) {
document.getElementById("output").innerHTML = "Stop Loss Invalid.";
return;
}

let positionSize = riskCapital / priceRisk;
let potentialProfit = priceReward * positionSize;

lastTrade = {
risk: riskCapital,
profit: potentialProfit
};

document.getElementById("output").innerHTML =
"<span class='green'>Position Size:</span> " + positionSize.toFixed(4) + " " + coin + "<br>" +
"<span class='green'>Risk:</span> $" + riskCapital.toFixed(2) + "<br>" +
"<span class='green'>Potential Profit:</span> $" + potentialProfit.toFixed(2);
}

// ================= SAVE =================
function saveTrade(){

if(!lastTrade){
alert("Calculate first.");
return;
}

let trades = JSON.parse(localStorage.getItem("trades")) || [];
let result = document.getElementById("resultSelect").value;
let profit = result === "win" ? lastTrade.profit : -lastTrade.risk;

trades.push(profit);
localStorage.setItem("trades", JSON.stringify(trades));

updateCharts();
}

// ================= CHARTS =================
let winChart = new Chart(document.getElementById('winChart'), {
type: 'line',
data: {
labels: [],
datasets: [
{
label: 'Win %',
data: [],
borderColor: '#00e676',
fill: false,
tension: 0.2
},
{
label: 'Loss %',
data: [],
borderColor: '#ff5252',
fill: false,
tension: 0.2
}
]
},
options: {
scales: {
y: { min: 0, max: 100 }
}
}
});

let profitChart = new Chart(document.getElementById('profitChart'), {
type: 'line',
data: {
labels: [],
datasets: [{
label: 'Equity',
data: [],
borderColor:'#00e676',
fill:false
}]
}
});

function updateCharts(){

let trades = JSON.parse(localStorage.getItem("trades")) || [];

let wins = 0;
let losses = 0;
let winRateData = [];
let lossRateData = [];
let labels = [];

trades.forEach((p, index) => {

if(p > 0){ wins++; } else { losses++; }

let total = wins + losses;

winRateData.push((wins/total*100).toFixed(2));
lossRateData.push((losses/total*100).toFixed(2));
labels.push(index + 1);

});

// BIG WINRATE
let totalTrades = wins + losses;
let currentWinrate = totalTrades > 0 ? (wins/totalTrades*100) : 0;
let big = document.getElementById("bigWinrate");

big.innerHTML = "Winrate: " + currentWinrate.toFixed(2) + "%";
big.style.color = currentWinrate >= 50 ? "#00e676" : "#ff5252";

// UPDATE WINRATE CHART
winChart.data.labels = labels;
winChart.data.datasets[0].data = winRateData;
winChart.data.datasets[1].data = lossRateData;
winChart.update();

// EQUITY CURVE
let equity=[];
let totalProfit=0;

trades.forEach((p)=>{
totalProfit+=p;
equity.push(totalProfit);
});

profitChart.data.labels = trades.map((_,i)=> i+1);
profitChart.data.datasets[0].data = equity;
profitChart.update();
}

updateCharts();

</script>

<footer style="margin-top:40px;text-align:center;font-size:13px;color:#777;">
© 2026 LyThaiSon. All rights reserved.
</footer>

</body>
</html>
