<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pro Futures Risk Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0e0e0e;
color:white;
padding:20px;
}

h2{margin-bottom:5px;}

.price-box{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:14px;
}

.green{color:#00e676;}
.red{color:#ff5252;}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:15px;
border:none;
border-radius:6px;
}

button{
background:#00c853;
color:white;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
}

.row button{
flex:1;
}

.small-btn{
padding:8px;
font-size:13px;
}

.wallet-box{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

canvas{
margin-top:20px;
background:#111;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h2>Pro Futures Risk Calculator</h2>

<!-- REALTIME PRICE -->
<div class="price-box">
<div id="btc"></div>
<div id="eth"></div>
<div id="sol"></div>
</div>

<!-- WALLET -->
<div class="wallet-box">
<input type="number" id="walletInput" placeholder="Set Wallet USDT">
<button class="small-btn" onclick="setWallet()">SET</button>
<button class="small-btn" onclick="resetWallet()">RESET</button>
</div>

<div><b>Wallet Balance: $<span id="walletBalance">0</span></b></div>

<label>Coin</label>
<select id="coin">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
</select>

<label>Direction</label>
<select id="direction">
<option value="long">LONG</option>
<option value="short">SHORT</option>
</select>

<label>Entry</label>
<input type="number" id="entry">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Risk %</label>
<input type="number" id="riskPercent">

<label>Leverage</label>
<input type="number" id="leverage">

<div class="row">
<button onclick="calculate()">CALCULATE</button>
<button onclick="saveTrade()">SAVE</button>
</div>

<label>Trade Result</label>
<select id="tradeResult">
<option value="win">WIN</option>
<option value="loss">LOSS</option>
</select>

<div id="output"></div>

<h3>Winrate Chart</h3>
<canvas id="winChart"></canvas>

<script>
let wallet=0;
let wins=0;
let losses=0;
let tradeCount=0;
let lastProfit=0;
let lastLoss=0;

// PRICE REALTIME
async function loadPrices(){
let coins=["BTCUSDT","ETHUSDT","SOLUSDT"];
for(let c of coins){
let res=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+c);
let data=await res.json();
let price=parseFloat(data.lastPrice).toFixed(2);
let change=parseFloat(data.priceChangePercent).toFixed(2);
let color=change>=0?"green":"red";
document.getElementById(c.slice(0,3).toLowerCase()).innerHTML=
c.slice(0,3)+": $"+price+
" <span class='"+color+"'>("+change+"%)</span>";
}
}
loadPrices();
setInterval(loadPrices,5000);

// WALLET
function setWallet(){
wallet=parseFloat(document.getElementById("walletInput").value)||0;
updateWallet();
}

function resetWallet(){
wallet=0;
wins=0;
losses=0;
tradeCount=0;
updateWallet();
updateChart();
}

function updateWallet(){
document.getElementById("walletBalance").innerText=wallet.toFixed(2);
}

// CALCULATE
function calculate(){
let entry=parseFloat(entry.value);
let tp=parseFloat(tp.value);
let sl=parseFloat(sl.value);
let riskPercent=parseFloat(riskPercent.value);
let lev=parseFloat(leverage.value);

if([entry,tp,sl,riskPercent,lev].some(isNaN)){return;}

let riskCapital=wallet*riskPercent/100;

let dir=direction.value;
let priceRisk=dir==="long"?entry-sl:sl-entry;
let priceReward=dir==="long"?tp-entry:entry-tp;

if(priceRisk<=0){return;}

let positionSize=riskCapital/priceRisk;
let positionValue=positionSize*entry;
let margin=positionValue/lev;
let rr=priceReward/priceRisk;
let potentialProfit=priceReward*positionSize;

lastProfit=potentialProfit;
lastLoss=riskCapital;

output.innerHTML=
"Risk Capital: $"+riskCapital.toFixed(2)+"<br>"+
"Position Size: "+positionSize.toFixed(4)+"<br>"+
"Margin Used: $"+margin.toFixed(2)+"<br>"+
"Potential Profit: $"+potentialProfit.toFixed(2)+"<br>"+
"Potential Loss: $"+riskCapital.toFixed(2)+"<br>"+
"<b>R:R = 1 : "+rr.toFixed(2)+"</b>";
}

// SAVE TRADE
function saveTrade(){
if(tradeResult.value==="win"){
wallet+=lastProfit;
wins++;
}else{
wallet-=lastLoss;
losses++;
}
tradeCount++;
updateWallet();
updateChart();
}

// CHART
let ctx=document.getElementById("winChart").getContext("2d");
let chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{label:"Win %",data:[],borderColor:"#00e676",fill:false},
{label:"Loss %",data:[],borderColor:"#ff5252",fill:false}
]
},
options:{
scales:{
x:{title:{display:true,text:"Trade #"}},
y:{title:{display:true,text:"Percentage (%)"},min:0,max:100}
}
}
});

function updateChart(){
let winrate=wins/(wins+losses||1)*100;
let lossrate=100-winrate;

chart.data.labels.push(tradeCount);
chart.data.datasets[0].data.push(winrate.toFixed(2));
chart.data.datasets[1].data.push(lossrate.toFixed(2));
chart.update();
}

</script>
</body>
</html>
