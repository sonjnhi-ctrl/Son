<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title> Futures Risk Calculator V1 ©Son </title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
background:#0e0e0e;
color:white;
padding:20px;
}
.btn-reset {
    background: #ff4444;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    margin-left: 10px;
    cursor: pointer;
}

.btn-reset:hover {
    opacity: 0.9;
}
.chart-wrapper {
    width: 100%;
    overflow-x: auto;
    overflow-y: hidden;
}


.flash-up{
    color:#00e676 !important;
    transition:0.2s;
}

.flash-down{
    color:#ff5252 !important;
    transition:0.2s;
}
.price-box{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:14px;
}

.green{color:#00e676;}
.red{color:#ff5252;}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:15px;
border:none;
border-radius:6px;
}

button{
background:#00c853;
color:white;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
}

.row button{flex:1;}

.small-btn{
padding:8px;
font-size:13px;
}

.wallet-box{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

#history{
margin-top:20px;
font-size:13px;
max-height:200px;
overflow:auto;
background:#111;
padding:10px;
border-radius:8px;
}

canvas{
margin-top:20px;
background:#111;
padding:10px;
border-radius:8px;
height:250px;
}
</style>
</head>

<body>

<h2>Pro Futures Risk Calculator</h2>

<div class="price-box">
<div id="btc"></div>
<div id="eth"></div>
<div id="sol"></div>
</div>

<div class="wallet-box">
<input type="number" id="walletInput" placeholder="Set Wallet USDT">
<button class="small-btn" onclick="setWallet()">SET</button>
<button class="small-btn" onclick="resetWallet()">RESET</button>
</div>

<div><b>Wallet Balance: $<span id="walletBalance">0</span></b></div>

<div style="margin-top:10px;">
Win: <span class="green" id="winPercent">0%</span> |
Loss: <span class="red" id="lossPercent">0%</span> |
Trades: <span id="totalTrades">0</span>
</div>

<label>Direction</label>
<select id="direction">
<option value="long">LONG</option>
<option value="short">SHORT</option>
</select>

<label>Entry</label>
<input type="number" id="entry">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Risk %</label>
<input type="number" id="riskPercent">

<label>Leverage</label>
<input type="number" id="leverage">

<div class="row">
<button onclick="calculate()">CALCULATE</button>
<button onclick="saveTrade()">SAVE</button>
</div>

<label>Trade Result</label>
<select id="tradeResult">
<option value="win">WIN</option>
<option value="loss">LOSS</option>
</select>

<div id="output"></div>

<h3>Winrate Chart</h3>
<canvas id="winChart" height="150"></canvas>

<h3>Profit Chart</h3>
<div id="profitWrapper" class="chart-wrapper" style="height:260px;">
    <canvas id="profitChart"></canvas>
</div>

<h3>Trade History</h3>
<div id="history"></div>

<script>
let wallet=0;
let wins=0;
let losses=0;
let lastPrices={};
let lastProfit=null;
let lastLoss=null;
let profitHistory=[]
let cumulativeProfit=0

// LOAD
window.onload=function(){
let data=JSON.parse(localStorage.getItem("tradeData"))||{};
wallet=data.wallet||0;
wins=data.wins||0;
losses=data.losses||0;
profitHistory=data.profitHistory||[];
cumulativeProfit=data.cumulativeProfit||0;

cleanOldHistory();
updateStats();
renderHistory();
updateCharts();
}

// CLEAN HISTORY > 1 YEAR
function cleanOldHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let oneYear=365*24*60*60*1000;
let now=Date.now();

history=history.filter(h=> now - h.timestamp < oneYear);

localStorage.setItem("history",JSON.stringify(history));
}

// WALLET
function setWallet(){
let value=parseFloat(walletInput.value);
if(isNaN(value)||value<=0){alert("Invalid wallet");return;}
wallet=value;
//profitHistory=[]; KHONG RESET
//cumulativeProfit=0; KHONG RESET
saveData();
updateStats();
updateCharts();
}

function resetWallet(){
localStorage.clear();

wallet=0;
wins=0;
losses=0;
profitHistory=[];
cumulativeProfit=0;
saveData(); 
updateStats();
updateCharts();
renderHistory();
}

// UPDATE
function updateStats(){

    walletBalance.innerText = wallet.toFixed(2);

    let total = wins + losses;

    let winrate = total ? (wins / total * 100) : 0;
    let lossrate = total ? (100 - winrate) : 0;

    winPercent.innerText = winrate.toFixed(1) + "%";
    lossPercent.innerText = lossrate.toFixed(1) + "%";
    totalTrades.innerText = total;
}

// CALCULATE
function calculate(){

if(wallet<=0){alert("Set wallet first");return;}

let entry=parseFloat(document.getElementById("entry").value);
let tp=parseFloat(document.getElementById("tp").value);
let sl=parseFloat(document.getElementById("sl").value);
let riskPercent=parseFloat(document.getElementById("riskPercent").value);
let lev=parseFloat(document.getElementById("leverage").value);

if([entry,tp,sl,riskPercent,lev].some(isNaN)){
alert("Missing value");
return;
}

let riskCapital=wallet*riskPercent/100;
let dir=direction.value;
let priceRisk=dir==="long"?entry-sl:sl-entry;
let priceReward=dir==="long"?tp-entry:entry-tp;

if(priceRisk<=0){alert("Invalid SL");return;}

let positionSize=riskCapital/priceRisk;
let positionValue=positionSize*entry;
let margin=positionValue/lev;
let rr=priceReward/priceRisk;
let potentialProfit=priceReward*positionSize;

lastProfit=potentialProfit;
lastLoss=riskCapital;

output.innerHTML=
"Risk Capital: $"+riskCapital.toFixed(2)+"<br>"+
"Margin Used: $"+margin.toFixed(2)+"<br>"+
"Potential Profit: $"+potentialProfit.toFixed(2)+"<br>"+
"Potential Loss: $"+riskCapital.toFixed(2)+"<br>"+
"<b>R:R = 1 : "+rr.toFixed(2)+"</b>";
}

// SAVE
function saveTrade(){
if(lastProfit===null){alert("Press CALCULATE first");return;}

let result=tradeResult.value;
let profit=0;

if(result==="win"){
wallet+=lastProfit;
wins++;
profit=lastProfit;
}else{
wallet-=lastLoss;
losses++;
profit=-lastLoss;
}

cumulativeProfit+=profit;
profitHistory.push(cumulativeProfit);

let history=JSON.parse(localStorage.getItem("history"))||[];
history.push({
time:new Date().toLocaleString(),
timestamp:Date.now(),
result:result,
wallet:wallet.toFixed(2)
});

localStorage.setItem("history",JSON.stringify(history));

saveData();
updateStats();
renderHistory();
updateCharts();

lastProfit=null;
lastLoss=null;
}

function renderHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let html="";
history.slice().reverse().forEach(h=>{
let color=h.result==="win"?"green":"red";
html+="<div class='"+color+"'>"+h.time+
" - "+h.result.toUpperCase()+
" - Wallet: $"+h.wallet+"</div>";
});
historyDiv=document.getElementById("history");
historyDiv.innerHTML=html;
}

function saveData(){
localStorage.setItem("tradeData",JSON.stringify({
wallet:wallet,
wins:wins,
losses:losses,
profitHistory:profitHistory,
cumulativeProfit:cumulativeProfit
}));
}

// CHARTS
// WINRATE CHART
let winChart=new Chart(document.getElementById("winChart"),{
type:"bar",
data:{
    labels:["Win","Loss"],
    datasets:[{
        data:[0,0],
        backgroundColor:["#00e676","#ff5252"],
        barThickness:30
    }]
},
options:{
    layout:{
        padding:{top:25}
    },
    plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
    },
    scales:{
        y:{
            title:{display:true,text:"Percentage (%)"},
            min:0,
            max:100
        },
        x:{
            title:{display:true,text:"Result"}
        }
    },
    animation:{
        onComplete:function(){
            const chart=this;
            const ctx=chart.ctx;

            ctx.save();
            ctx.font="12px Arial";
            ctx.textAlign="center";

            chart.data.datasets.forEach((dataset,i)=>{
                chart.getDatasetMeta(i).data.forEach((bar,index)=>{
                    let value=dataset.data[index];

                    ctx.fillStyle="#ffffff";
                    ctx.fillText(
                        value.toFixed(1)+"%",
                        bar.x,
                        bar.y - 10
                    );
                });
            });

            ctx.restore();
        }
    }
}
});

//LAM TRON 1000=1K$
function formatMoney(value){

    let abs = Math.abs(value);

    if(abs >= 1000000000){
        return (value/1000000000).toFixed(1) + "B";
    }

    if(abs >= 1000000){
        return (value/1000000).toFixed(1) + "M";
    }

    if(abs >= 1000){
        return (value/1000).toFixed(1) + "K";
    }

    return Math.round(value).toString();
}
    
// PROFIT CHART
let profitChart = new Chart(document.getElementById("profitChart"), {
type: "bar",
data: {
    labels: [],
    datasets:[{
data:[],
backgroundColor:[],
barPercentage: 0.6, // Do Day Thanh Bar
categoryPercentage: 0.6 // Khoang Canh Bar
}]
},
options: {
    responsive: true,
    maintainAspectRatio: false,

    plugins: {
        legend: { display: false },
        tooltip: { enabled: false }
    },

    scales: {
        y: {
            beginAtZero: true,
            title: {
                display: true,
                text: "Cumulative Profit (USDT)"
            }
        },
        x: {
            title: {
                display: true,
                text: "Number"
            }
        }
    },

    animation: {
        onComplete: function () {
            const chart = this;
            const ctx = chart.ctx;

            ctx.save();
            ctx.font = "9px Arial";
            ctx.textAlign = "center";

            chart.data.datasets.forEach((dataset, i) => {
                chart.getDatasetMeta(i).data.forEach((bar, index) => {

                    let value = dataset.data[index];
                    ctx.fillStyle = value >= 0 ? "#00e676" : "#ff5252";

                    let formatted = formatMoney(value);
let text = (value>0?"+":"") + formatted + "$";

                    if (value >= 0) {
                        ctx.fillText(text, bar.x, bar.y - 4);
                    } else {
                        ctx.fillText(text, bar.x, bar.y + 15);
                    }

                });
            });

            ctx.restore();
        }
    }
}
});

function updateCharts(){

    let total = wins + losses;
    let winrate = total ? (wins/total*100) : 0;
    let lossrate = total ? (losses/total*100) : 0;
//WINRATE DATA
    winChart.data.datasets[0].data = [winrate, lossrate];
    winChart.update();

   // PROFIT CHART UPDATE
// ==== LIMIT 6 BAR DISPLAY ====
let fullData = profitHistory;
let maxBars = 6;

// lấy 6 phần tử cuối
let data = fullData.slice(-maxBars);

// tạo label đúng theo index thật
// ==== LIMIT 6 BAR DISPLAY ====
let fullData = profitHistory;
let maxBars = 6;

// lấy 6 phần tử cuối
let data = fullData.slice(-maxBars);

// tạo label đúng theo index thật

// ==== LIMIT 6 BAR DISPLAY ====
let fullData = profitHistory;
let maxBars = 6;

// lấy 6 phần tử cuối
let data = fullData.slice(-maxBars);

// tạo label đúng theo index thật
let startIndex = fullData.length - data.length;

profitChart.data.labels = data.map((_, i) => startIndex + i + 1);
profitChart.data.datasets[0].data = data;

profitChart.data.datasets[0].backgroundColor =
    data.map(v => v >= 0 ? "#00e676" : "#ff5252");
   
    profitChart.update();
 // AUTO SCROLL TO LAST BAR
let wrapper = document.getElementById("profitWrapper");
    wrapper.scrollTo({
    left: wrapper.scrollWidth,
    behavior: "smooth"
});
}


// REALTIME PRICE + FLASH
async function fetchPrices(){

    const symbols=["BTCUSDT","ETHUSDT","SOLUSDT"];

    for(let s of symbols){

        try{
            let res=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+s);
            let data=await res.json();

            let price=parseFloat(data.lastPrice);
            let change=parseFloat(data.priceChangePercent).toFixed(2);

            let id=s.slice(0,3).toLowerCase();
            let element=document.getElementById(id);

            let color=change>=0?"green":"red";
            let sign=change>=0?"+":"";

            element.innerHTML=
                "<b>"+s.slice(0,3)+"</b>: " +
                "<span id='"+id+"-price'>$"+price.toFixed(2)+"</span> " +
                "<span class='"+color+"'>("+sign+change+"%)</span>";

            let priceEl=document.getElementById(id+"-price");

            if(lastPrices[s]){
                if(price>lastPrices[s]){
                    priceEl.classList.add("flash-up");
                    setTimeout(()=>priceEl.classList.remove("flash-up"),500);
                }
                if(price<lastPrices[s]){
                    priceEl.classList.add("flash-down");
                    setTimeout(()=>priceEl.classList.remove("flash-down"),500);
                }
            }

            lastPrices[s]=price;

        }catch(e){
            console.log(e);
        }
    }
}

setInterval(fetchPrices,2000);
fetchPrices();
</script>
</body>
</html>
