<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pro Futures Risk Calculator</title>

<style>
body{
font-family:Arial;
background:#0e0e0e;
color:white;
padding:20px;
}

.price-box{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:14px;
}

.green{color:#00e676;}
.red{color:#ff5252;}

input,select,button{
width:100%;
padding:10px;
margin:6px 0;
font-size:15px;
border:none;
border-radius:6px;
}

button{
background:#00c853;
color:white;
cursor:pointer;
}

.row{
display:flex;
gap:10px;
}

.row button{flex:1;}

.small-btn{
padding:8px;
font-size:13px;
}

.wallet-box{
display:flex;
gap:10px;
align-items:center;
margin-bottom:10px;
}

#history{
margin-top:20px;
font-size:13px;
max-height:200px;
overflow:auto;
background:#111;
padding:10px;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Pro Futures Risk Calculator</h2>

<!-- REALTIME PRICE -->
<div class="price-box">
<div id="btc"></div>
<div id="eth"></div>
<div id="sol"></div>
</div>

<!-- WALLET -->
<div class="wallet-box">
<input type="number" id="walletInput" placeholder="Set Wallet USDT">
<button class="small-btn" onclick="setWallet()">SET</button>
<button class="small-btn" onclick="resetWallet()">RESET</button>
</div>

<div><b>Wallet Balance: $<span id="walletBalance">0</span></b></div>

<div style="margin-top:10px;">
Win: <span class="green" id="winPercent">0%</span> |
Loss: <span class="red" id="lossPercent">0%</span> |
Trades: <span id="totalTrades">0</span>
</div>

<label>Coin</label>
<select id="coin">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
</select>

<label>Direction</label>
<select id="direction">
<option value="long">LONG</option>
<option value="short">SHORT</option>
</select>

<label>Entry</label>
<input type="number" id="entry">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Risk %</label>
<input type="number" id="riskPercent">

<label>Leverage</label>
<input type="number" id="leverage">

<div class="row">
<button onclick="calculate()">CALCULATE</button>
<button onclick="saveTrade()">SAVE</button>
</div>

<label>Trade Result</label>
<select id="tradeResult">
<option value="win">WIN</option>
<option value="loss">LOSS</option>
</select>

<div id="output"></div>

<h3>Trade History</h3>
<div id="history"></div>

<script>
let wallet=0;
let wins=0;
let losses=0;
let lastProfit=0;
let lastLoss=0;

// LOAD HISTORY
window.onload=function(){
let data=JSON.parse(localStorage.getItem("tradeData"))||{};
wallet=data.wallet||0;
wins=data.wins||0;
losses=data.losses||0;
updateStats();
renderHistory();
}

// REALTIME PRICE
async function loadPrices(){
let coins=["BTCUSDT","ETHUSDT","SOLUSDT"];
for(let c of coins){
let res=await fetch("https://api.binance.com/api/v3/ticker/24hr?symbol="+c);
let data=await res.json();
let price=parseFloat(data.lastPrice).toFixed(2);
let change=parseFloat(data.priceChangePercent).toFixed(2);
let color=change>=0?"green":"red";
document.getElementById(c.slice(0,3).toLowerCase()).innerHTML=
c.slice(0,3)+": $"+price+
" <span class='"+color+"'>("+change+"%)</span>";
}
}
loadPrices();
setInterval(loadPrices,5000);

// WALLET
function setWallet(){
wallet=parseFloat(document.getElementById("walletInput").value)||0;
saveData();
updateStats();
}

function resetWallet(){
localStorage.removeItem("tradeData");
wallet=0;
wins=0;
losses=0;
updateStats();
renderHistory();
}

function updateStats(){
document.getElementById("walletBalance").innerText=wallet.toFixed(2);
let total=wins+losses;
let winrate=total?((wins/total)*100).toFixed(1):0;
let lossrate=total?(100-winrate).toFixed(1):0;

document.getElementById("winPercent").innerText=winrate+"%";
document.getElementById("lossPercent").innerText=lossrate+"%";
document.getElementById("totalTrades").innerText=total;
}

// CALCULATE
function calculate(){
let entry=parseFloat(document.getElementById("entry").value);
let tp=parseFloat(document.getElementById("tp").value);
let sl=parseFloat(document.getElementById("sl").value);
let riskPercent=parseFloat(document.getElementById("riskPercent").value);
let lev=parseFloat(document.getElementById("leverage").value);

if([entry,tp,sl,riskPercent,lev].some(isNaN)){
alert("Missing value");
return;
}

let riskCapital=wallet*riskPercent/100;

let dir=document.getElementById("direction").value;
let priceRisk=dir==="long"?entry-sl:sl-entry;
let priceReward=dir==="long"?tp-entry:entry-tp;

if(priceRisk<=0){
alert("Invalid SL");
return;
}

let positionSize=riskCapital/priceRisk;
let positionValue=positionSize*entry;
let margin=positionValue/lev;
let rr=priceReward/priceRisk;
let potentialProfit=priceReward*positionSize;

lastProfit=potentialProfit;
lastLoss=riskCapital;

document.getElementById("output").innerHTML=
"Risk Capital: $"+riskCapital.toFixed(2)+"<br>"+
"Margin Used: $"+margin.toFixed(2)+"<br>"+
"Potential Profit: $"+potentialProfit.toFixed(2)+"<br>"+
"Potential Loss: $"+riskCapital.toFixed(2)+"<br>"+
"<b>R:R = 1 : "+rr.toFixed(2)+"</b>";
}

// SAVE
function saveTrade(){
let result=document.getElementById("tradeResult").value;

if(result==="win"){
wallet+=lastProfit;
wins++;
}else{
wallet-=lastLoss;
losses++;
}

let history=JSON.parse(localStorage.getItem("history"))||[];
history.push({
time:new Date().toLocaleString(),
result:result,
wallet:wallet.toFixed(2)
});
localStorage.setItem("history",JSON.stringify(history));

saveData();
updateStats();
renderHistory();
}

function renderHistory(){
let history=JSON.parse(localStorage.getItem("history"))||[];
let html="";
history.slice().reverse().forEach(h=>{
let color=h.result==="win"?"green":"red";
html+="<div class='"+color+"'>"+h.time+
" - "+h.result.toUpperCase()+
" - Wallet: $"+h.wallet+"</div>";
});
document.getElementById("history").innerHTML=html;
}

function saveData(){
localStorage.setItem("tradeData",JSON.stringify({
wallet:wallet,
wins:wins,
losses:losses
}));
}
</script>
</body>
</html>
