<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pro Futures Risk Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#0e0e0e; color:white;}
input, select, button { width:100%; padding:10px; margin:6px 0; font-size:16px;}
button { background:#00c853; color:white; border:none; cursor:pointer;}
button:hover { opacity:0.9; }
.result { margin-top:20px; font-size:16px; line-height:1.6;}
.green { color:#00e676; }
.red { color:#ff5252; }
.price-box { background:#1a1a1a; padding:10px; margin-bottom:15px; border-radius:8px; }
.chart-box { margin-top:30px; }
.row { display:flex; gap:10px; }
.row button { width:50%; }
.small-btn { background:#2962ff; font-size:14px; }
.wallet-box { background:#111; padding:15px; border-radius:8px; margin-bottom:20px;}
.big-wallet { font-size:28px; font-weight:bold; }
table { width:100%; border-collapse:collapse; margin-top:20px; font-size:13px;}
th,td { border:1px solid #333; padding:6px; text-align:center;}
th { background:#1a1a1a; }
</style>

</head>
<body>

<h2>Pro Futures Risk Calculator</h2>

<div class="wallet-box">
<label>Initial Wallet (USDT)</label>
<input type="number" id="initialWallet">

<button onclick="setWallet()">Set Wallet</button>

<div class="big-wallet">
Current Wallet: $<span id="walletBalance">0.00</span>
</div>

<button style="background:#ff5252;" onclick="resetWallet()">Reset Wallet</button>
</div>

<label>Select Coin</label>
<select id="coinSelect">
<option value="BTCUSDT">BTC</option>
<option value="ETHUSDT">ETH</option>
<option value="SOLUSDT">SOL</option>
</select>

<label>Direction</label>
<select id="direction">
<option value="long">LONG</option>
<option value="short">SHORT</option>
</select>

<label>Entry Price</label>
<input type="number" id="entry">

<label>Take Profit</label>
<input type="number" id="tp">

<label>Stop Loss</label>
<input type="number" id="sl">

<label>Risk % per Trade</label>
<input type="number" id="riskPercent">

<label>Leverage</label>
<input type="number" id="leverage">

<div class="row">
<button onclick="calculate()">CALCULATE</button>
<button onclick="saveTrade()">SAVE</button>
</div>

<label>Trade Result</label>
<select id="resultSelect">
<option value="win">WIN</option>
<option value="loss">LOSS</option>
</select>

<div class="result" id="output"></div>

<div class="chart-box">
<h3>Equity Curve (Wallet USDT)</h3>
<canvas id="profitChart"></canvas>
</div>

<script>

// ===== WALLET SYSTEM =====
function setWallet(){
let value=parseFloat(initialWallet.value);
if(isNaN(value)){alert("Enter wallet value");return;}
localStorage.setItem("wallet",value);
localStorage.setItem("initialWallet",value);
updateWalletDisplay();
updateCharts();
}

function updateWalletDisplay(){
let wallet=parseFloat(localStorage.getItem("wallet"))||0;
document.getElementById("walletBalance").innerText=wallet.toFixed(2);
}

function resetWallet(){
localStorage.removeItem("wallet");
localStorage.removeItem("initialWallet");
localStorage.removeItem("trades");
updateWalletDisplay();
updateCharts();
}

updateWalletDisplay();

// ===== CALCULATOR =====
let lastTrade=null;

function calculate(){

let wallet=parseFloat(localStorage.getItem("wallet"));
if(!wallet){alert("Set wallet first.");return;}

let dir=direction.value;
let entryVal=parseFloat(entry.value);
let tpVal=parseFloat(tp.value);
let slVal=parseFloat(sl.value);
let riskPercentVal=parseFloat(riskPercent.value);
let levVal=parseFloat(leverage.value);

if([entryVal,tpVal,slVal,riskPercentVal,levVal].some(isNaN)){
output.innerHTML="Enter all values.";
return;
}

let riskCapital=wallet*riskPercentVal/100;
let priceRisk=dir==="long"?entryVal-slVal:slVal-entryVal;
let priceReward=dir==="long"?tpVal-entryVal:entryVal-tpVal;

if(priceRisk<=0){
output.innerHTML="Stop Loss Invalid.";
return;
}

let positionSize=riskCapital/priceRisk;
let potentialProfit=priceReward*positionSize;
let rr=priceReward/priceRisk;

lastTrade={risk:riskCapital,profit:potentialProfit};

output.innerHTML=
"<span class='green'>Risk Capital:</span> $"+riskCapital.toFixed(2)+"<br>"+
"<span class='green'>Potential Profit:</span> $"+potentialProfit.toFixed(2)+"<br>"+
"<span class='red'>Potential Loss:</span> $"+riskCapital.toFixed(2)+"<br>"+
"<b>R:R = 1 : "+rr.toFixed(2)+"</b>";
}

// ===== SAVE TRADE =====
function saveTrade(){

if(!lastTrade){alert("Calculate first.");return;}

let trades=JSON.parse(localStorage.getItem("trades"))||[];
let wallet=parseFloat(localStorage.getItem("wallet"))||0;

let result=resultSelect.value;
let profit=result==="win"?lastTrade.profit:-lastTrade.risk;

wallet+=profit;

localStorage.setItem("wallet",wallet);
trades.push(wallet);
localStorage.setItem("trades",JSON.stringify(trades));

updateWalletDisplay();
updateCharts();
}

// ===== CHART =====
let profitChart=new Chart(document.getElementById('profitChart'),{
type:'line',
data:{labels:[],datasets:[
{label:'Wallet Balance (USDT)',data:[],borderColor:'#00e676',fill:false,tension:0.4}
]},
options:{
scales:{
x:{title:{display:true,text:'Trade #'}},
y:{title:{display:true,text:'Wallet (USDT)'}}
}
}
});

function updateCharts(){
let trades=JSON.parse(localStorage.getItem("trades"))||[];
profitChart.data.labels=trades.map((_,i)=>i+1);
profitChart.data.datasets[0].data=trades;
profitChart.update();
}

updateCharts();

</script>

</body>
</html>
